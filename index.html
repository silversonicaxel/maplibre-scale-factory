<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MapLibre Scale Factory - Demo</title>
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@latest/dist/maplibre-gl.css" />
  <style>
    body { margin: 0; padding: 0; }
    #map { width: 100vw; height: 100vh; }
  </style>
</head>
<body>
  <div id="map"></div>

  <script type="module">
    import { Map } from 'maplibre-gl';
    import { MapLibreScaleFactory } from './src/index.ts';

    const map = new Map({
      container: 'map',
      style: {
        version: 8,
        sources: {},
        layers: []
      },
      center: [0, 0],
      zoom: 2
    });

    map.on("load", () => {
        map.addSource("osm", {
            type: "raster",
            tiles: [
                "https://a.tile.openstreetmap.org/{z}/{x}/{y}.png",
                "https://b.tile.openstreetmap.org/{z}/{x}/{y}.png",
                "https://c.tile.openstreetmap.org/{z}/{x}/{y}.png",
            ],
            tileSize: 256,
            attribution: "Open Street Map"
        });

        map.addLayer({
            id: "osm",
            type: "raster",
            source: "osm",
            layout: { visibility: "visible" },
            metadata: { name: "OpenStreetMap" }
        });

        const scaleFactory = new MapLibreScaleFactory({ withLabelOverflow: true });
        map.addControl(scaleFactory, "bottom-left");
    });
  </script>
</body>
</html>
